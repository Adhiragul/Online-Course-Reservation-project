spring.application.name=backend
server.port=8080

spring.datasource.url=jdbc:h2:file:./data/coursedb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

app.jwt.secret=${APP_JWT_SECRET:change-this-dev-jwt-secret-at-least-32-characters-long}
app.jwt.expirationTime=86400000
app.cors.allowedOrigins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}

spring.h2.console.enabled=true

# Email Configuration (Gmail SMTP)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
